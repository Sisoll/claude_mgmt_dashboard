<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Sessions</title>
<link rel="icon" id="favicon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%228%22%20fill%3D%22%231a1815%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%225%22%20fill%3D%22%23c9684a%22%2F%3E%3C%2Fsvg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui/styles.css">
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Sessions <span class="sub">/ dashboard</span></div>
    </div>

    <div class="topbar-stats">
      <span class="stat-pill"><span class="dot" style="background:var(--text-muted)"></span><span><b id="stat-total">6</b> active</span></span>
      <span class="stat-pill running"><span class="dot"></span><span><b id="stat-running">2</b> running</span></span>
      <span class="stat-pill waiting"><span class="dot"></span><span><b id="stat-waiting">2</b> awaiting you</span></span>
      <span class="stat-pill success"><span class="dot"></span><span><b id="stat-done">1</b> done</span></span>
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" title="重新偵測 alive sessions + 重抓所有 session 狀態" id="refresh-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 0 1 10.5-4M14 8a6 6 0 0 1-10.5 4"/><path d="M13 1v4h-4M3 15v-4h4"/></svg>
      </button>
      <button class="icon-btn" title="清掃已死 session 留下的檔案：statusline tmp / pid markers / waiting+stop flags（不會動你的自訂名稱）" id="cleanup-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 5h11"/><path d="M5 5v8.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5V5"/><path d="M6.5 5V3.2a.7.7 0 0 1 .7-.7h1.6a.7.7 0 0 1 .7.7V5"/><path d="M7 7.5v4M9 7.5v4"/></svg>
      </button>
      <button class="icon-btn" title="Sound on/off" id="sound-toggle">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4.5 6H2v4h2.5L8 13V3Z"/><path d="M11 6c.8.8.8 3.2 0 4"/><path d="M13 4c2 2 2 6 0 8"/></svg>
      </button>
      <div class="settings-wrap">
        <button class="icon-btn" title="設定" id="settings-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2"/><path d="M13 8a5 5 0 0 0-.1-1l1.4-1-1.5-2.6-1.6.7a5 5 0 0 0-1.7-1L9 1.5H6L5.5 3a5 5 0 0 0-1.7 1l-1.6-.7L.7 6l1.4 1a5 5 0 0 0 0 2L.7 10l1.5 2.6 1.6-.7a5 5 0 0 0 1.7 1l.5 1.6h3l.5-1.6a5 5 0 0 0 1.7-1l1.6.7 1.5-2.6-1.4-1a5 5 0 0 0 .1-1Z"/></svg>
        </button>
        <div class="settings-panel hidden" id="settings-panel">
          <div class="settings-title">設定</div>
          <div class="settings-row">
            <span class="settings-label">啟用通知<span class="settings-hint">瀏覽器桌面通知（需授權）</span></span>
            <button class="switch" id="notify-toggle" role="switch" aria-checked="true" title="開關桌面通知"><span class="switch-knob"></span></button>
          </div>
        </div>
      </div>
      <button class="icon-btn" id="open-claude-btn" title="開新 Claude 網頁（claude.ai/new，另開分頁）" style="background:var(--text); color:#fff; border-color:var(--text);">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 11.5 11 5"/><path d="M6.5 5H11v4.5"/></svg>
      </button>
      <button class="icon-btn" title="重啟 dashboard server（起新 process 取代；會短暫斷線後自動連回）" id="restart-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.7-4"/><path d="M13.5 2.5V6H10"/></svg>
      </button>
      <button class="icon-btn icon-btn-danger" title="關閉 dashboard（終止 server；autostart 只在登入時跑，關了要手動重開）" id="shutdown-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5v6.5"/><path d="M4.7 4.2a4.5 4.5 0 1 0 6.6 0"/></svg>
      </button>
    </div>
  </header>

  <!-- Usage quota panel -->
  <div class="quota-panel unavailable" id="quota-panel">
    <span>—— quota 面板需 statusline hook（見 SETUP.md）——</span>
  </div>

  <!-- Permission banner -->
  <div class="perm-banner" id="perm-banner">
    <div class="bell">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2a4 4 0 0 0-4 4v3l-1.5 2h11L12 9V6a4 4 0 0 0-4-4Z"/><path d="M6.5 13a1.5 1.5 0 0 0 3 0"/></svg>
    </div>
    <div class="grow">
      <div style="font-weight:600; color:var(--text); font-size:13px;">啟用桌面通知</div>
      <div style="font-size:12.5px; color:var(--text-muted);">當 session 需要您決定時，桌面通知 + 提示音 + 工作列閃爍會立即提醒。</div>
    </div>
    <button class="ghost" id="perm-dismiss">稍後再說</button>
    <button id="perm-enable">允許通知</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="chip active" data-filter="all">全部 <span class="count">6</span></button>
    <button class="chip" data-filter="waiting">需要決定 <span class="count">2</span></button>
    <button class="chip" data-filter="running">執行中 <span class="count">2</span></button>
    <button class="chip" data-filter="completed">已完成 <span class="count">1</span></button>
    <button class="chip" data-filter="pending">待定 <span class="count">0</span></button>
    <button class="chip" data-filter="custom">自訂 <span class="count">0</span></button>
    <button class="chip" data-filter="failed">錯誤 <span class="count">1</span></button>
    <div style="flex:1"></div>
    <div style="font-size:12px; color:var(--text-faint); font-family:var(--font-mono);">sorted by: status · last active</div>
  </div>

  <!-- Section -->
  <div class="section-title">
    <h2>Active sessions</h2>
    <div class="section-actions">
      <span class="meta">refreshed 4s ago</span>
      <button class="icon-btn" id="collapse-all-btn" title="收合所有展開的卡片（像捲簾往上收）">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h10"/><path d="M4.5 8.5 8 5l3.5 3.5"/><path d="M4.5 12.5 8 9l3.5 3.5"/></svg>
      </button>
    </div>
  </div>

  <div class="sessions" id="sessions"></div>
</div>

<!-- Toast stack -->
<div class="toast-stack" id="toast-stack"></div>

<script type="module" src="ui/app.js"></script>

</body>
</html>
