<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Sessions</title>
<link rel="icon" id="favicon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%228%22%20fill%3D%22%231a1815%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%225%22%20fill%3D%22%23c9684a%22%2F%3E%3C%2Fsvg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* warm neutrals -- cream paper background, soft borders */
    --bg: #f6f3ef;
    --bg-elevated: #fbfaf7;
    --surface: #ffffff;
    --surface-2: #faf8f4;
    --border: #ece7df;
    --border-strong: #ddd5c8;
    --divider: #f0ebe2;

    /* text */
    --text: #1f1c18;
    --text-secondary: #4a4640;
    --text-muted: #857e74;
    --text-faint: #b3aa9c;

    /* accent: warm terracotta */
    --accent: #c9684a;
    --accent-deep: #a64f33;
    --accent-soft: #f5e3da;
    --accent-tint: #fbf1ec;

    /* status colors -- harmonized warm palette */
    --running: #2b6cb0;
    --running-soft: #e2ecf6;
    --running-ring: rgba(43,108,176,0.18);

    --waiting: #c43838;
    --waiting-soft: #fbe4e2;
    --waiting-ring: rgba(196,56,56,0.22);
    --waiting-deep: #8a1f1f;

    --success: #4a7c4f;
    --success-soft: #e3eee2;

    --error: #8a3a2a;
    --error-soft: #f1dfd8;

    /* health gradient for usage bars -- green (plenty left) → amber → red (nearly out) */
    --health-good: #4a9d5b;
    --health-warn: #d98a2b;
    --health-crit: #c43838;

    --shadow-sm: 0 1px 2px rgba(40,30,15,0.04), 0 0 0 1px rgba(40,30,15,0.04);
    --shadow-md: 0 1px 3px rgba(40,30,15,0.06), 0 4px 12px rgba(40,30,15,0.04), 0 0 0 1px rgba(40,30,15,0.05);
    --shadow-waiting: 0 0 0 1px var(--waiting), 0 0 0 4px var(--waiting-ring), 0 8px 24px rgba(196,56,56,0.12);

    --radius: 10px;
    --radius-sm: 6px;
    --radius-xs: 4px;

    --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.005em;
  }

  /* ============ Layout ============ */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }

  /* ============ Top bar ============ */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--divider);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .brand-mark::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }
  .brand-name {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .brand-name .sub {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 8px;
  }

  .topbar-stats {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--text-secondary);
  }
  .stat-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .stat-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
  }
  .stat-pill.waiting { background: var(--waiting-soft); border-color: transparent; color: var(--waiting-deep); font-weight: 500; }
  .stat-pill.waiting .dot { background: var(--waiting); animation: pulse-dot 1.6s ease-in-out infinite; }
  .stat-pill.running .dot { background: var(--running); }
  .stat-pill.success .dot { background: var(--success); }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s ease;
    padding: 0;
  }
  .icon-btn:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--border-strong);
  }
  .icon-btn svg { width: 15px; height: 15px; }

  /* ============ Section title ============ */
  .section-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .section-title h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .section-title .meta {
    font-size: 12px;
    color: var(--text-faint);
    font-family: var(--font-mono);
  }

  /* ============ Sessions stack ============ */
  .sessions {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* ============ Card ============ */
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: var(--border-strong);
  }
  .card.is-waiting {
    border-color: transparent;
    box-shadow: var(--shadow-waiting);
    animation: card-pulse 2.4s ease-in-out infinite;
  }
  .card.is-waiting .card-head { background: linear-gradient(180deg, var(--waiting-soft), transparent 80%); }

  .card.is-completed {
    border-color: var(--success);
    box-shadow: 0 0 0 1px var(--success), 0 4px 16px rgba(74,124,79,0.10);
  }
  .card.is-completed .card-head { background: linear-gradient(180deg, var(--success-soft), transparent 80%); }

  .card.is-failed-state {
    border-color: var(--error);
    box-shadow: 0 0 0 1px var(--error), 0 4px 16px rgba(138,58,42,0.12);
  }
  .card.is-failed-state .card-head { background: linear-gradient(180deg, var(--error-soft), transparent 80%); }

  /* Persistent attention pulse — set on any running → non-running transition,
     cleared when the user interacts with the card. is-waiting already pulses via
     its own infinite animation, so this only adds the completed/failed variants. */
  .card.needs-attention.is-completed {
    border-color: transparent;
    animation: card-pulse-completed-persist 2.4s ease-in-out infinite;
  }
  .card.needs-attention.is-failed-state {
    border-color: transparent;
    animation: card-pulse-failed-persist 2.4s ease-in-out infinite;
  }

  /* Orbiting marquee — a bright dot of light running around the perimeter of
     the card while it needs attention. Done with a conic-gradient on a pseudo-
     element + @property animation. Wide-ish "tail" so it reads as motion. */
  @property --orbit-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  .card.needs-attention { --orbit-color: var(--success); }
  .card.needs-attention.is-waiting       { --orbit-color: var(--waiting); }
  .card.needs-attention.is-failed-state  { --orbit-color: var(--error); }
  .card.needs-attention::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: calc(var(--radius) + 3px);
    padding: 3px;
    background: conic-gradient(
      from var(--orbit-angle),
      transparent 0deg,
      transparent 280deg,
      var(--orbit-color) 320deg,
      var(--orbit-color) 360deg
    );
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: orbit-marquee 2.6s linear infinite;
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.15s ease-out;
  }
  /* Hover acknowledges attention — drop the orbit so it stops nagging while you read */
  .card.needs-attention:hover::before { opacity: 0; }
  @keyframes orbit-marquee {
    to { --orbit-angle: 360deg; }
  }
  @keyframes card-pulse-completed-persist {
    0%, 100% { box-shadow: 0 0 0 1px var(--success), 0 6px 18px rgba(74,124,79,0.10); }
    50%      { box-shadow: 0 0 0 1px var(--success), 0 6px 18px rgba(74,124,79,0.22); }
  }
  @keyframes card-pulse-failed-persist {
    0%, 100% { box-shadow: 0 0 0 1px var(--error), 0 6px 18px rgba(138,58,42,0.10); }
    50%      { box-shadow: 0 0 0 1px var(--error), 0 6px 18px rgba(138,58,42,0.22); }
  }

  @keyframes card-pulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--waiting), 0 6px 18px rgba(196,56,56,0.10); }
    50%      { box-shadow: 0 0 0 1px var(--waiting), 0 6px 18px rgba(196,56,56,0.22); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.35); }
  }

  /* ============ Card head (always visible) ============ */
  .card-head {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 36px 18px 18px;
    cursor: pointer;
    user-select: none;
  }
  .card-head:hover { background: var(--surface-2); }

  .chev {
    width: 18px;
    height: 18px;
    color: var(--text-faint);
    transition: transform 0.18s ease;
    flex-shrink: 0;
  }
  .card[data-collapsed="false"] .chev { transform: rotate(90deg); }

  .head-main {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    min-height: 24px;
  }
  /* Folder/project name — stamped onto the card's top-left border like a file tab */
  .folder-label {
    position: absolute;
    top: -19px;
    left: 18px;
    z-index: 3;
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    background: var(--text);
    border-radius: 7px;
    padding: 6px 16px;
    line-height: 1.25;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(40,30,15,0.20), 0 0 0 2px var(--surface);
  }
  .card.is-waiting       .folder-label { box-shadow: 0 2px 6px rgba(40,30,15,0.20), 0 0 0 2px var(--waiting-soft); }
  .card.is-completed     .folder-label { box-shadow: 0 2px 6px rgba(40,30,15,0.20), 0 0 0 2px var(--success-soft); }
  .card.is-failed-state  .folder-label { box-shadow: 0 2px 6px rgba(40,30,15,0.20), 0 0 0 2px var(--error-soft); }
  .shared-cwd-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: #8a6a00;
    background: #fff5e1;
    border: 1px solid #f3e2b2;
    border-radius: 4px;
    padding: 1px 6px;
    cursor: help;
    line-height: 1.4;
  }
  .shared-cwd-badge::before {
    content: '⚠';
    font-size: 10px;
  }
  .session-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: -0.005em;
    line-height: 1.4;
    outline: none;
    border-radius: 4px;
    padding: 1px 4px;
    margin: 0 -4px;
    cursor: text;
    min-width: 0;
    word-break: break-word;
  }
  .session-name:hover { background: var(--surface-2); }
  .session-name:focus { background: var(--accent-tint); box-shadow: inset 0 0 0 1px var(--accent); }
  .rename-hint {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--font-mono);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .session-name:hover + .rename-hint { opacity: 1; }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    min-width: 0;
    line-height: 1.4;
    flex-wrap: wrap;
    row-gap: 4px;
  }
  .meta-row > * { flex-shrink: 0; }
  .meta-row .path {
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex-shrink: 1;
  }
  .meta-row .branch {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--accent-deep);
  }
  .meta-row .branch svg { width: 11px; height: 11px; }
  .meta-row .sep { color: var(--text-faint); }
  .meta-row .model-pill {
    display: inline-flex;
    align-items: center;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: var(--surface-2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    font-family: var(--font-mono);
  }
  .meta-row .perm-pill {
    display: inline-flex;
    align-items: center;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-family: var(--font-mono);
    border: 1px solid var(--border);
  }
  .perm-pill[data-mode="default"]           { background: var(--surface-2); color: var(--text-muted); }
  .perm-pill[data-mode="acceptEdits"]       { background: #fff5e1; color: #8a6a00; border-color: #f3e2b2; }
  .perm-pill[data-mode="bypassPermissions"] { background: var(--waiting-soft); color: var(--waiting-deep); border-color: rgba(196,56,56,0.25); }
  .perm-pill[data-mode="plan"]              { background: var(--accent-tint); color: var(--accent-deep); border-color: var(--accent-soft); }
  /* Host pill — floats at top-right corner of the card, mirror of folder-label */
  .host-pill {
    position: absolute;
    top: -12px;
    right: 18px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 11px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    font-family: var(--font-mono);
    background: var(--surface);
    color: var(--text-secondary);
    border: 1px solid var(--border-strong);
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(40,30,15,0.10), 0 0 0 2px var(--surface);
    letter-spacing: 0.02em;
  }
  .host-pill::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.55;
  }
  .host-pill[data-host="terminal"], .host-pill[data-host="cli"]                   { color: var(--text-secondary); }
  .host-pill[data-host="shell"]                                                    { background: #e6e7ff; color: #3a3d8c; border-color: #c8caee; }
  .host-pill[data-host="bash"]                                                     { background: #e9f5e3; color: #3a6b25; border-color: #cfe5be; }
  .host-pill[data-host="ide"], .host-pill[data-host="claude-vscode"]               { background: #e7f1fb; color: #1d5aa6; border-color: #c8def5; }
  .host-pill[data-host="jetbrains"], .host-pill[data-host="claude-jetbrains"], .host-pill[data-host="claude-intellij"] { background: #fce7d6; color: #b3551a; border-color: #f5cea9; }
  .host-pill[data-host="other"]                                                    { color: var(--text-muted); }

  /* ============ Manual-status override indicator ============ */
  .status-override-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-left: 6px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    font-style: italic;
  }

  /* ============ Status badge ============ */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status.running   { background: var(--running-soft); color: var(--running); }
  .status.running .dot   { background: var(--running); animation: pulse-dot 1.8s ease-in-out infinite; }
  .status.waiting   { background: var(--waiting); color: #fff; }
  .status.waiting .dot   { background: #fff; animation: pulse-dot 1.2s ease-in-out infinite; }
  .status.completed { background: var(--success-soft); color: var(--success); }
  .status.completed .dot { background: var(--success); }
  .status.failed    { background: var(--error-soft); color: var(--error); }
  .status.failed .dot    { background: var(--error); }

  .runtime {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 80px;
  }
  /* Status cluster — status pill + a tiny inline action (mark-done) stacked underneath */
  .status-cluster {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }
  .status-cluster .mini-action {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  .status-cluster .mini-action:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
  .runtime .label { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }

  /* ============ Card body (collapsible) ============ */
  .card[data-collapsed="true"] .card-body { display: none; }
  .card-body {
    border-top: 1px solid var(--divider);
    padding: 22px 22px 22px 48px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 30px;
  }
  .body-main { min-width: 0; }
  .body-side {
    border-left: 1px solid var(--divider);
    padding-left: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ============ Conversation blocks ============ */
  .block { margin-bottom: 18px; }
  .block:last-child { margin-bottom: 0; }
  .block-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .block-label::before {
    content: '';
    width: 3px; height: 12px; border-radius: 2px;
    background: var(--border-strong);
  }
  .block.prompt .block-label::before { background: var(--text-secondary); }
  .block.summary .block-label::before { background: var(--accent); }
  .block.current .block-label::before { background: var(--running); }
  .block.decision .block-label::before { background: var(--waiting); }

  .prompt-text {
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
  }
  .summary-text {
    color: var(--text-secondary);
    font-size: 13.5px;
    line-height: 1.6;
  }
  .summary-text .hl { color: var(--text); font-weight: 500; background: var(--accent-tint); padding: 1px 4px; border-radius: 3px; }

  .current-task {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-secondary);
  }
  .current-task .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--running);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .current-task code {
    background: rgba(0,0,0,0.04);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent-deep);
    font-size: 12px;
  }

  .decision-box {
    background: var(--waiting-soft);
    border: 1px solid rgba(196,56,56,0.2);
    border-left: 3px solid var(--waiting);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    color: var(--waiting-deep);
    font-size: 13.5px;
    line-height: 1.5;
  }
  .decision-box strong { color: var(--waiting-deep); font-weight: 600; }
  .decision-choices {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .decision-choices .btn {
    background: #fff;
    border: 1px solid rgba(196,56,56,0.3);
    color: var(--waiting-deep);
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 5px 10px;
    border-radius: var(--radius-xs);
    cursor: pointer;
  }
  .decision-choices .btn:hover { background: var(--waiting); color: #fff; border-color: var(--waiting); }

  /* ============ Conversation turns (collapsible, scrollable) ============ */
  .block.conversation .block-label::before { background: var(--accent); }
  .conv-actions {
    display: inline-flex;
    gap: 6px;
    margin-left: 8px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .conv-btn {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 1px 7px;
    cursor: pointer;
    letter-spacing: 0;
  }
  .conv-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
  .hidden-banner {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    padding: 8px 4px;
    border-bottom: 1px dashed var(--divider);
    cursor: pointer;
    user-select: none;
    text-align: center;
  }
  .hidden-banner:hover { color: var(--text-secondary); background: var(--surface-2); }
  .turns {
    display: flex;
    flex-direction: column;
    max-height: 520px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
    padding-right: 4px;
  }
  .turns::-webkit-scrollbar { width: 6px; }
  .turns::-webkit-scrollbar-track { background: transparent; }
  .turns::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  .turns::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
  .turn {
    display: flex;
    flex-direction: column;
    border-top: 1px dashed var(--divider);
  }
  .turn:first-child { border-top: none; }
  .turn-head {
    display: grid;
    grid-template-columns: 46px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 4px 8px 0;
    cursor: pointer;
    user-select: none;
    border-radius: 4px;
  }
  .turn-head:hover { background: var(--surface-2); }
  .turn-ts {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
  }
  .turn-preview {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .turn.is-latest .turn-preview { color: var(--text); font-weight: 500; }
  .turn-badges {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-faint);
    display: flex;
    gap: 6px;
    white-space: nowrap;
  }
  .turn-chev {
    width: 12px;
    height: 12px;
    color: var(--text-faint);
    transition: transform 0.18s;
    flex-shrink: 0;
  }
  .turn[data-collapsed="false"] .turn-chev { transform: rotate(90deg); }
  .turn[data-collapsed="true"] .turn-body { display: none; }
  .turn-body {
    padding: 4px 0 12px 56px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13.5px;
    line-height: 1.55;
  }
  .turn-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 8px;
    vertical-align: 1px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .turn-tag.tag-asst {
    color: var(--accent-deep);
    background: var(--accent-tint);
    border-color: var(--accent-soft);
  }
  .turn-user { color: var(--text); word-break: break-word; white-space: pre-wrap; }
  .turn-assistant { color: var(--text-secondary); word-break: break-word; white-space: pre-wrap; }
  /* Older (non-latest) turns: fade out so the latest visually pops */
  .turn:not(.is-latest) .turn-head { opacity: 0.62; }
  .turn:not(.is-latest) .turn-user,
  .turn:not(.is-latest) .turn-assistant { color: var(--text-faint); }
  /* Latest turn: subtle highlight wash to lock the eye to "here's what's happening NOW" */
  .turn.is-latest .turn-user {
    background: var(--accent-tint);
    border-left: 2px solid var(--accent-soft);
    padding: 8px 10px;
    margin-left: -10px;
    border-radius: 0 5px 5px 0;
  }
  .turn-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 2px;
  }
  .tool-chip {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
  }
  .tool-chip code {
    font-size: 10.5px;
    color: var(--accent-deep);
    background: transparent;
    padding: 0 3px 0 0;
    border-radius: 0;
  }

  /* ============ Sub-agents ============ */
  .subagents-head {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .subagent {
    display: grid;
    grid-template-columns: 14px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: var(--radius-xs);
    font-size: 12.5px;
  }
  .subagent:hover { background: var(--surface-2); }
  .subagent .sa-icon { width: 14px; height: 14px; color: var(--text-faint); }
  .subagent .sa-name {
    font-family: var(--font-mono);
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .subagent .sa-status {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 500;
    white-space: nowrap;
  }
  .sa-status.running   { background: var(--running-soft); color: var(--running); }
  .sa-status.waiting   { background: var(--waiting); color: #fff; }
  .sa-status.completed { background: var(--success-soft); color: var(--success); }
  .sa-status.failed    { background: var(--error-soft); color: var(--error); }

  /* ============ Side panel content ============ */
  .side-block { display: flex; flex-direction: column; gap: 4px; }
  .side-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .side-value {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .side-value.faded { color: var(--text-muted); }

  .token-bar {
    height: 9px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 5px;
    border: 1px solid var(--border-strong);
    box-shadow: inset 0 1px 2px rgba(40,30,15,0.05);
  }
  .token-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.4s ease, background-color 0.3s ease;
  }
  /* health tiers — colored by how much headroom is LEFT, not how much is used */
  .fill.health-good { background: var(--health-good); }
  .fill.health-warn { background: var(--health-warn); }
  .fill.health-crit { background: var(--health-crit); }

  /* ============ Action buttons ============ */
  .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .action-btn {
    flex: 1;
    min-width: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 7px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--font-sans);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .action-btn:hover {
    background: var(--surface-2);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .action-btn svg { width: 12px; height: 12px; }
  .action-btn.primary {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .action-btn.primary:hover { background: #000; color: #fff; }
  .action-btn.danger:hover {
    background: var(--waiting-soft);
    border-color: var(--waiting);
    color: var(--waiting-deep);
  }

  /* ============ Toast ============ */
  .toast-stack {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1000;
    max-width: 360px;
  }
  .toast {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--waiting);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: 0 8px 24px rgba(40,30,15,0.12), 0 0 0 1px rgba(40,30,15,0.04);
    animation: toast-in 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes toast-in {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .toast .t-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--waiting-soft);
    color: var(--waiting);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .toast .t-icon svg { width: 14px; height: 14px; }
  .toast .t-body { min-width: 0; }
  .toast .t-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .toast .t-msg   { font-size: 12.5px; color: var(--text-secondary); line-height: 1.45; }
  .toast .t-close {
    width: 22px; height: 22px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .toast .t-close:hover { background: var(--surface-2); color: var(--text); }

  /* ============ Permission banner ============ */
  .perm-banner {
    background: var(--accent-tint);
    border: 1px solid var(--accent-soft);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .perm-banner .bell {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #fff;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid var(--accent-soft);
  }
  .perm-banner .bell svg { width: 14px; height: 14px; }
  .perm-banner .grow { flex: 1; }
  .perm-banner button {
    background: var(--text);
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 12.5px;
    cursor: pointer;
  }
  .perm-banner button.ghost {
    background: transparent;
    color: var(--text-muted);
  }
  .perm-banner.hidden { display: none; }

  /* ============ Usage quota panel ============ */
  .quota-panel {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .quota-panel.unavailable { color: var(--text-faint); justify-content: center; font-style: italic; }
  .quota-item { display: flex; align-items: center; gap: 8px; }
  .quota-label {
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    font-size: 10.5px;
    text-transform: uppercase;
  }
  .quota-value { color: var(--text); font-weight: 500; }
  .quota-reset { color: var(--text-faint); }
  .quota-bar {
    width: 88px;
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border-strong);
    box-shadow: inset 0 1px 2px rgba(40,30,15,0.05);
  }
  /* no base background here — the health-* class (always applied) sets the color;
     a literal background would win on source order and mask it (that was the bug) */
  .quota-bar .fill { height: 100%; border-radius: 999px; transition: width 0.4s ease, background-color 0.3s ease; }
  .quota-sep { color: var(--text-faint); margin: 0 4px; }

  /* ============ Filter chips ============ */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .chip {
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font-sans);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .chip .count {
    font-family: var(--font-mono);
    font-size: 11px;
    background: rgba(0,0,0,0.06);
    padding: 1px 6px;
    border-radius: 999px;
    color: var(--text-muted);
  }
  .chip.active .count { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }

  /* ============ Empty / hidden ============ */
  .card.is-hidden { display: none; }

  /* ============ Inline icons ============ */
  .i { display: inline-flex; vertical-align: middle; }
</style>
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Sessions <span class="sub">/ dashboard</span></div>
    </div>

    <div class="topbar-stats">
      <span class="stat-pill"><span class="dot" style="background:var(--text-muted)"></span><span><b id="stat-total">6</b> active</span></span>
      <span class="stat-pill running"><span class="dot"></span><span><b id="stat-running">2</b> running</span></span>
      <span class="stat-pill waiting"><span class="dot"></span><span><b id="stat-waiting">2</b> awaiting you</span></span>
      <span class="stat-pill success"><span class="dot"></span><span><b id="stat-done">1</b> done</span></span>
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" title="重新偵測 alive sessions + 重抓所有 session 狀態" id="refresh-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 0 1 10.5-4M14 8a6 6 0 0 1-10.5 4"/><path d="M13 1v4h-4M3 15v-4h4"/></svg>
      </button>
      <button class="icon-btn" title="清掃已死 session 留下的檔案：statusline tmp / pid markers / waiting+stop flags（不會動你的自訂名稱）" id="cleanup-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 5h11"/><path d="M5 5v8.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5V5"/><path d="M6.5 5V3.2a.7.7 0 0 1 .7-.7h1.6a.7.7 0 0 1 .7.7V5"/><path d="M7 7.5v4M9 7.5v4"/></svg>
      </button>
      <button class="icon-btn" title="Sound on/off" id="sound-toggle">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4.5 6H2v4h2.5L8 13V3Z"/><path d="M11 6c.8.8.8 3.2 0 4"/><path d="M13 4c2 2 2 6 0 8"/></svg>
      </button>
      <button class="icon-btn" title="Settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2"/><path d="M13 8a5 5 0 0 0-.1-1l1.4-1-1.5-2.6-1.6.7a5 5 0 0 0-1.7-1L9 1.5H6L5.5 3a5 5 0 0 0-1.7 1l-1.6-.7L.7 6l1.4 1a5 5 0 0 0 0 2L.7 10l1.5 2.6 1.6-.7a5 5 0 0 0 1.7 1l.5 1.6h3l.5-1.6a5 5 0 0 0 1.7-1l1.6.7 1.5-2.6-1.4-1a5 5 0 0 0 .1-1Z"/></svg>
      </button>
      <button class="icon-btn" title="New session" style="background:var(--text); color:#fff; border-color:var(--text);">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      </button>
    </div>
  </header>

  <!-- Usage quota panel -->
  <div class="quota-panel unavailable" id="quota-panel">
    <span>—— quota 資料尚未啟用 ——</span>
  </div>

  <!-- Permission banner -->
  <div class="perm-banner" id="perm-banner">
    <div class="bell">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2a4 4 0 0 0-4 4v3l-1.5 2h11L12 9V6a4 4 0 0 0-4-4Z"/><path d="M6.5 13a1.5 1.5 0 0 0 3 0"/></svg>
    </div>
    <div class="grow">
      <div style="font-weight:600; color:var(--text); font-size:13px;">啟用桌面通知</div>
      <div style="font-size:12.5px; color:var(--text-muted);">當 session 需要您決定時，桌面通知 + 提示音 + 工作列閃爍會立即提醒。</div>
    </div>
    <button class="ghost" id="perm-dismiss">稍後再說</button>
    <button id="perm-enable">允許通知</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="chip active" data-filter="all">全部 <span class="count">6</span></button>
    <button class="chip" data-filter="waiting">需要決定 <span class="count">2</span></button>
    <button class="chip" data-filter="running">執行中 <span class="count">2</span></button>
    <button class="chip" data-filter="completed">已完成 <span class="count">1</span></button>
    <button class="chip" data-filter="failed">錯誤 <span class="count">1</span></button>
    <div style="flex:1"></div>
    <div style="font-size:12px; color:var(--text-faint); font-family:var(--font-mono);">sorted by: status · last active</div>
  </div>

  <!-- Section -->
  <div class="section-title">
    <h2>Active sessions</h2>
    <span class="meta">refreshed 4s ago</span>
  </div>

  <div class="sessions" id="sessions"></div>
</div>

<!-- Toast stack -->
<div class="toast-stack" id="toast-stack"></div>

<script>
(function () {
  // ============== Shared helpers ==============
  const $ = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => (root || document).querySelectorAll(sel);

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function formatHHMM(ms) {
    const d = new Date(ms);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  function formatRuntime(ms) {
    if (!ms || ms < 0) ms = 0;
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
    if (m > 0) return `${m}m ${String(sec).padStart(2,'0')}s`;
    return `${sec}s`;
  }
  function formatRelative(ms) {
    if (!ms) return 'just now';
    const diff = Date.now() - ms;
    if (diff < 5000) return 'just now';
    if (diff < 60000) return Math.floor(diff/1000) + 's ago';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    return Math.floor(diff/3600000) + 'h ago';
  }

  const STATUS_LABEL = {
    running: 'Running',
    waiting: 'Waiting for input',
    completed: 'Completed',
    failed: 'Error',
  };
  const SUBAGENT_LABEL = {
    running: 'running',
    waiting: 'waiting',
    completed: 'done',
    failed: 'failed',
  };
  const PERM_LABEL = {
    default: 'ask',
    acceptEdits: 'auto-edit',
    bypassPermissions: 'YOLO',
    plan: 'plan-only',
  };
  function hostKindFromName(n) {
    if (!n) return '';
    const low = n.toLowerCase();
    if (low.includes('code') || low.includes('cursor')) return 'ide';
    if (low.includes('idea') || low.includes('pycharm') || low.includes('webstorm') || low.includes('phpstorm') || low.includes('goland') || low.includes('rider')) return 'jetbrains';
    if (low.includes('mintty') || low.includes('bash') || low.includes('wsl')) return 'bash';
    if (low.includes('powershell') || low.includes('pwsh') || low.includes('cmd')) return 'shell';
    if (low.includes('terminal') || low.includes('conemu') || low.includes('cmder') || low.includes('alacritty') || low.includes('wezterm')) return 'terminal';
    return 'other';

  // ============== Audio chime ==============
  let audioCtx = null;
  let soundOn = true;
  function ensureCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    return audioCtx;
  }
  function playTones(notes, type = 'sine', peakGain = 0.18) {
    if (!soundOn) return;
    const ctx = ensureCtx();
    if (!ctx) return;
    notes.forEach(n => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type;
      osc.frequency.value = n.f;
      const start = ctx.currentTime + n.t;
      const dur = n.d || 0.30;
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(peakGain, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(start); osc.stop(start + dur + 0.05);
    });
  }
  function chime()           { playTones([{ f: 659.25, t: 0 }, { f: 880.00, t: 0.12 }], 'sine', 0.18); }
  function chimeCompletion() { playTones([{ f: 783.99, t: 0, d: 0.20 }, { f: 1046.50, t: 0.10, d: 0.22 }], 'sine', 0.10); }
  function chimeFailure()    { playTones([{ f: 329.63, t: 0, d: 0.28 }, { f: 220.00, t: 0.14, d: 0.32 }], 'triangle', 0.16); }

    if (svg) {
      svg.style.transition = 'transform 0.6s linear';
      svg.style.transform = 'rotate(360deg)';

      refreshSpinTimer = setTimeout(() => { svg.style.transition = ''; svg.style.transform = ''; }, 650);
    }
    try {
      const res = await fetch('/api/refresh', { method: 'POST' });
      const data = await res.json();
      if (res.ok && data.ok) {
        pushToast({ title: '已重新整理', msg: `${data.sessionsAfter} 個 session（之前 ${data.sessionsBefore} 個）` });
        // Server will push a fresh snapshot via WS within ~400ms

        pushToast({ title: '重新整理失敗', msg: data.error || `HTTP ${res.status}` });
      }
    } catch (err) {
      pushToast({ title: '重新整理失敗', msg: err.message });

  let flashTimer = null;

  function startFlash(waitingCount) {
    if (flashTimer) clearInterval(flashTimer);

  }

  }
  function briefFlash(times, kind) {
    if (flashTimer) return; // continuous waiting flash takes precedence

    briefFlashTimer = setInterval(() => {

  }

  function renderSubagent(sa) {

  function sortSessions(arr) {
    const order = { waiting: 0, running: 1, completed: 2, failed: 3 };
    return arr.slice().sort((a, b) => {
      const da = order[a.status] ?? 9;
      const db = order[b.status] ?? 9;
      if (da !== db) return da - db;
      return (b.lastActivity || 0) - (a.lastActivity || 0);
    });
  }

  function renderAll() {
    // Pause render while user is editing a session name (otherwise their typing gets wiped)
    if (document.activeElement?.matches?.('.session-name')) {
      pendingRender = true;
      return;
    }

    // Snapshot scroll positions of each .turns container per-sid so they survive re-render
    const scrollSnapshot = new Map();
    sessionsContainer.querySelectorAll('.card').forEach(card => {
      const sid = card.getAttribute('data-sid');
      const t = card.querySelector('.turns');
      if (sid && t) {
        const atBottom = (t.scrollTop + t.clientHeight) >= (t.scrollHeight - 24);
        scrollSnapshot.set(sid, { top: t.scrollTop, atBottom });
      }
    });

    const arr = sortSessions(Array.from(liveSessions.values()));
    if (arr.length === 0) {
      sessionsContainer.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-faint); border:1px dashed var(--border); border-radius:var(--radius);">沒有偵測到 alive 的 Claude session。</div>';
    } else {
      sessionsContainer.innerHTML = arr.map(renderCard).join('');
    }

    // Defer scroll restoration until layout is computed so scrollHeight is accurate
    requestAnimationFrame(() => {
      sessionsContainer.querySelectorAll('.card').forEach(card => {
        const sid = card.getAttribute('data-sid');
        const t = card.querySelector('.turns');
        if (!t) return;
        const prev = scrollSnapshot.get(sid);
        // New cards (no prev entry) AND cards that were near the bottom auto-stick to bottom
        // so the latest turn is visible "at a glance". Only preserve mid-scroll if user
        // explicitly scrolled up to read history.
        if (!prev || prev.atBottom !== false) {
          t.scrollTop = t.scrollHeight;
        } else {
          t.scrollTop = prev.top;
        }
      });
    });

    applyFilter(currentFilter);
    updateStats();
    updateAttention();
  }

  function updateStats() {
    const sessions = Array.from(liveSessions.values());
    const counts = { all: sessions.length, running: 0, waiting: 0, completed: 0, failed: 0 };
    for (const s of sessions) {
      if (counts[s.status] !== undefined) counts[s.status]++;
    }
    $('#stat-total').textContent = counts.all;
    $('#stat-running').textContent = counts.running;
    $('#stat-waiting').textContent = counts.waiting;
    $('#stat-done').textContent = counts.completed;
    // chip counts
    $$('.chip').forEach(c => {
      const f = c.getAttribute('data-filter');
      const span = c.querySelector('.count');
      if (span) span.textContent = counts[f] ?? 0;
    });
  }

  function applyFilter(f) {
    currentFilter = f;
    $$('.card').forEach(card => {
      const s = card.getAttribute('data-status');
      card.classList.toggle('is-hidden', !(f === 'all' || f === s));
    });
  }

  function detectTransitionsAndAlert(snapshot) {
    for (const s of snapshot) {
      const prev = prevStatuses.get(s.sid);
      const next = s.status;
      const displayName = s.name || s.sid.slice(0,8);
      if (prev && prev !== next) {
        // Any running → (non-running) transition raises attention; persists until
        // the user collapses the card to acknowledge it.
        if (prev === 'running' && next !== 'running') {
          attentionSids.add(s.sid);
        }
        if (next === 'waiting') {
          chime();
          pushToast({ title: `${displayName} 等待您決定`, msg: (s.summary?.text || '').slice(0, 140) || '請查看該 session' });
          pushNotif(`${displayName} 等待您決定`, (s.summary?.text || '').slice(0, 140));
        } else if (next === 'completed' && prev === 'running') {
          chimeCompletion();
          briefFlash(3, 'completed');
          pushToast({ title: `${displayName} 完成`, msg: (s.summary?.text || '').slice(0, 140) || '可下達下一個指令' });
          pushNotif(`${displayName} 完成`, (s.summary?.text || '').slice(0, 140));
        } else if (next === 'failed') {
          chimeFailure();
          briefFlash(5, 'failed');
          pushToast({ title: `${displayName} 失敗`, msg: s.lastError || '查看詳情' });
          pushNotif(`${displayName} 失敗`, s.lastError || '');
        }
      }
      prevStatuses.set(s.sid, next);
    }
  }

  // ============== Delegation: collapse / rename / actions / filters / turn-toggle / view-watermark ==============
  sessionsContainer.addEventListener('click', (e) => {
    // View-watermark controls (hide / reset)
    const watermarkBtn = e.target.closest('[data-action="hide-history"], [data-action="reset-view"]');
    if (watermarkBtn) {
      e.stopPropagation();
      const card = watermarkBtn.closest('.card');
      const sid = card?.getAttribute('data-sid');
      const s = sid && liveSessions.get(sid);
      if (!s) return;
      const action = watermarkBtn.getAttribute('data-action');
      let viewedSince = 0;
      if (action === 'hide-history') {
        const history = s.history || [];
        const lastTs = history.length ? (history[history.length - 1].ts || Date.now()) : Date.now();
        viewedSince = lastTs + 1;
      }
      s.viewedSince = viewedSince;
      if (wsSend) wsSend({ type: 'setViewedSince', sid, viewedSince });
      renderAll();
      return;
    }

    // Turn-level collapse toggle — handle first since it's nested inside card-head's siblings
    const turnHead = e.target.closest('.turn-head');
    if (turnHead) {
      e.stopPropagation();
      const turnEl = turnHead.closest('.turn');
      const card = turnEl.closest('.card');
      const sid = card?.getAttribute('data-sid');
      const ts = Number(turnEl.getAttribute('data-ts'));
      const wasCollapsed = turnEl.getAttribute('data-collapsed') === 'true';
      const nextCollapsed = !wasCollapsed;
      turnEl.setAttribute('data-collapsed', String(nextCollapsed));
      if (sid) {
        if (!turnExpansion.has(sid)) turnExpansion.set(sid, new Map());
        turnExpansion.get(sid).set(ts, !nextCollapsed);
      }
      return;
    }

    const head = e.target.closest('.card-head');
    if (head && !e.target.closest('.session-name, .action-btn, .mini-action, .status, .btn')) {
      const card = head.closest('.card');
      const cur = card.getAttribute('data-collapsed') === 'true';
      const next = !cur;
      card.setAttribute('data-collapsed', next ? 'true' : 'false');
      const sid = card.getAttribute('data-sid');
      if (sid) {
        // Any click on the card head — collapse OR expand — acknowledges the attention pulse
        if (attentionSids.has(sid)) {
          attentionSids.delete(sid);
          card.classList.remove('needs-attention');
        }
        if (wsSend) wsSend({ type: 'setCollapsed', sid, collapsed: next });
      }
      return;
    }

    const actionBtn = e.target.closest('.action-btn, .mini-action');
    if (actionBtn) {
      e.stopPropagation();
      const card = actionBtn.closest('.card');
      const sid = card?.getAttribute('data-sid');
      const action = actionBtn.getAttribute('data-action');

      // Local-only actions (sidecar via WS, no API roundtrip needed)
      if (action === 'markDone') {
        if (!sid) return;
        const s = liveSessions.get(sid);
        if (s) {
          s.computedStatus = s.status;
          s.status = 'completed';
          s.statusOverridden = true;
          renderAll();
        }
        if (wsSend) wsSend({ type: 'markStatus', sid, status: 'completed' });
        pushToast({ title: '已標記完成', msg: '若有新對話進來會自動解除' });
        return;
      }
      if (action === 'clearManualStatus') {
        if (!sid) return;
        const s = liveSessions.get(sid);
        if (s) {
          s.statusOverridden = false;
          if (s.computedStatus) s.status = s.computedStatus;
          renderAll();
        }
        if (wsSend) wsSend({ type: 'clearManualStatus', sid });
        return;
      }

      handleAction(sid, action, actionBtn.textContent.trim());
      return;
    }
  });

  sessionsContainer.addEventListener('focusin', (e) => {
    const name = e.target.closest('.session-name');
    if (name) name.dataset.original = name.textContent;
  });
  sessionsContainer.addEventListener('focusout', (e) => {
    const name = e.target.closest('.session-name');
    if (!name) return;
    const card = name.closest('.card');
    const sid = card?.getAttribute('data-sid');
    const newName = name.textContent.trim();
    if (sid && newName && newName !== name.dataset.original) {
      const s = liveSessions.get(sid);
      if (s) s.name = newName;
      if (wsSend) wsSend({ type: 'rename', sid, name: newName });
    }
    setTimeout(() => {
      if (document.activeElement?.matches?.('.session-name')) return;
      if (pendingRender) { pendingRender = false; renderAll(); }
    }, 50);
  });
  sessionsContainer.addEventListener('keydown', (e) => {
    const name = e.target.closest('.session-name');
    if (!name) return;
    if (e.key === 'Enter') { e.preventDefault(); name.blur(); }
    if (e.key === 'Escape') {
      name.textContent = name.dataset.original || name.textContent;
      name.blur();
    }
  });

  $$('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      $$('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      applyFilter(chip.getAttribute('data-filter'));
      updateAttention();
    });
  });

  async function handleAction(sid, action, label) {
    if (!sid) return;
    if (action === 'terminate') {
      if (!confirm(`確定要終止這個 Claude session (sid=${sid.slice(0,8)})？\n會送 SIGTERM 給對應 process。`)) return;
    }
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(sid)}/${action}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}',
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        pushToast({ title: `${label} 失敗`, msg: data.error || `HTTP ${res.status}` });
        return;
      }
      if (data.code === 1 && (data.stdout?.startsWith('NOT_FOUND') || data.stderr)) {
        pushToast({ title: label, msg: '找不到對應的 IDE / terminal 視窗' });
      } else if (action === 'flash' && data.stdout?.startsWith('OK')) {
        pushToast({ title: '已閃工作列', msg: '對應 host 視窗正在閃爍' });
      } else if (action === 'terminate' && data.ok) {
        pushToast({ title: 'Session 已終止', msg: 'process.kill(SIGTERM) 已送出' });
      } else if (data.stdout?.startsWith('OK') || data.ok) {
        // focus success — keep quiet (window already came to front, no need for toast)
      } else {
        pushToast({ title: label, msg: JSON.stringify(data).slice(0, 120) });
      }
    } catch (err) {
      pushToast({ title: `${label} 失敗`, msg: err.message });
    }
  }

  // ============== Runtime ticker (smooth runtime / relative-time updates) ==============
  function startRuntimeTicker() {
    if (runtimeTicker) return;
    runtimeTicker = setInterval(() => {
      const now = Date.now();
      $$('.card').forEach(card => {
        const sid = card.getAttribute('data-sid');
        const s = liveSessions.get(sid);
        if (!s) return;
        const runtimeEl = card.querySelector('.runtime');
        if (runtimeEl) {
          const elapsed = (s.runtimeMs || 0) + (now - (s._receivedAt || now));
          runtimeEl.innerHTML = `<span class="label">runtime</span>${formatRuntime(elapsed)}`;
        }
        const activeEl = card.querySelector('.meta-active');
        if (activeEl) {
          const ts = Number(activeEl.dataset.lastActivity) || 0;
          if (ts) activeEl.textContent = 'active ' + formatRelative(ts);
        }
      });
    }, 1000);
  }

  // ============== Usage quota polling ==============
  const quotaEl = $('#quota-panel');
  const QUOTA_REFRESH_INTERVAL = 8000;
  let lastQuotaData = null;
  let nextQuotaFetchAt = 0;

  // Color a usage bar by remaining headroom (health), not by how much is used:
  // plenty left = green, getting low = amber, nearly out = red.
  function healthClass(remainPct) {
    if (typeof remainPct !== 'number' || isNaN(remainPct)) return 'health-good';
    if (remainPct >= 50) return 'health-good';
    if (remainPct >= 20) return 'health-warn';
    return 'health-crit';
  }

  function quotaItem(label, pct, kind /* 'used' | 'remain' */, ago) {
    if (pct == null) return `<span class="quota-item"><span class="quota-label">${label}</span><span class="quota-reset">n/a</span></span>`;
    const remain = kind === 'remain' ? pct : 100 - pct;
    const agoHtml = ago ? `<span class="quota-reset">· ${ago}</span>` : '';
    return `<span class="quota-item">
      <span class="quota-label">${label}</span>
      <span class="quota-bar"><span class="fill ${healthClass(remain)}" style="width:${pct}%"></span></span>
      <span class="quota-value">${pct}%${kind === 'remain' ? ' remain' : ' used'}</span>
      ${agoHtml}
    </span>`;
  }

  function formatAgo(s) {
    if (s < 60)    return `${s}s ago`;
    if (s < 3600)  return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  }

  function renderQuotaPanel() {
    const data = lastQuotaData;
    if (!data || !data.available) {
      quotaEl.className = 'quota-panel unavailable';
      quotaEl.innerHTML = '<span>—— quota 資料尚未啟用（statusline 還沒被 Claude Code 觸發過）——</span>';
      return;
    }
    const now = Date.now();
    const ageS = Math.max(0, Math.floor((now - (data.refreshedAt || 0)) / 1000));
    const ageLabel = formatAgo(ageS);
    const isStale = ageS > 300;
    const nextInS = Math.max(0, Math.ceil((nextQuotaFetchAt - now) / 1000));

    quotaEl.className = 'quota-panel' + (isStale ? ' unavailable' : '');
    quotaEl.innerHTML = `
      ${quotaItem('5h-limit', data.fiveHUsedPct, 'used', ageLabel)}
      <span class="quota-sep">|</span>
      ${quotaItem('week-limit', data.sevenDUsedPct, 'used', ageLabel)}
      <span class="quota-sep">·</span>
      <span class="quota-reset">${isStale ? '(stale) · ' : ''}poll in ${nextInS}s</span>
    `;
  }

  async function fetchQuota() {
    try {
      const res = await fetch('/api/usage', { cache: 'no-store' });
      if (!res.ok) return;
      lastQuotaData = await res.json();
    } catch {}
    nextQuotaFetchAt = Date.now() + QUOTA_REFRESH_INTERVAL;
    renderQuotaPanel();
  }
  fetchQuota();
  setInterval(fetchQuota, QUOTA_REFRESH_INTERVAL);
  // Re-render every second so age + countdown stay live without re-fetching
  setInterval(renderQuotaPanel, 1000);

  // ============== WebSocket client ==============
  let ws = null;
  let wsSend = null;
  let reconnectDelay = 1000;
  let offlineBannerShown = false;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    try {
      ws = new WebSocket(`${proto}//${location.host}/`);
    } catch (e) {
      scheduleReconnect();
      return;
    }
    ws.onopen = () => {
      connected = true;
      reconnectDelay = 1000;
      if (offlineBannerShown) {
        offlineBannerShown = false;
        pushToast({ title: 'Server 已連線', msg: '即時 session 資料已啟動' });
      }
    };
    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      const now = Date.now();
      if (msg.type === 'snapshot') {
        liveSessions.clear();
        for (const s of msg.sessions) {
          s._receivedAt = now;
          liveSessions.set(s.sid, s);
        }
        detectTransitionsAndAlert(msg.sessions);
        renderAll();
        startRuntimeTicker();
      } else if (msg.type === 'update' && msg.session) {
        msg.session._receivedAt = now;
        liveSessions.set(msg.session.sid, msg.session);
        detectTransitionsAndAlert([msg.session]);
        renderAll();
      } else if (msg.type === 'remove' && msg.sid) {
        liveSessions.delete(msg.sid);
        prevStatuses.delete(msg.sid);
        renderAll();
      } else if (msg.type === 'toast') {
        pushToast({ title: msg.title, msg: msg.msg });
      }
    };
    ws.onclose = () => {
      connected = false;
      ws = null;
      wsSend = null;
      scheduleReconnect();
    };
    ws.onerror = () => {
      if (ws) try { ws.close(); } catch {}
    };
    wsSend = (obj) => { try { ws && ws.send(JSON.stringify(obj)); } catch {} };
  }

  function scheduleReconnect() {
    if (!offlineBannerShown) {
      offlineBannerShown = true;
      pushToast({ title: 'Server 離線', msg: '無法連到 dashboard server (127.0.0.1:7878)，將自動重連…' });
    }
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
  }

  connect();
})();
</script>

</body>
</html>
